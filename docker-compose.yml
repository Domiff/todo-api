services:
  promtail:
    image: grafana/promtail:latest
    container_name: todo-api-promtail
    ports:
      - "9080:9080"
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./grafana/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    privileged: true

  loki:
    image: grafana/loki:latest
    container_name: todo-api-loki
    ports:
      - "3100:3100"
    volumes:
      - ./grafana/loki-config.yml:/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:latest
    container_name: todo-api-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yaml
      - grafana_data:/var/lib/grafana

  backend:
    container_name: todo-api-backend
    build:
      dockerfile: Dockerfile
    env_file:
      .env.django
    command:
      - /wait-for-it.sh
      - pg:5432
      - --
      - daphne
      - -u
      - /tmp/daphne.sock
      - todo_manager.asgi:application
    volumes:
      - ./tmp:/tmp
    depends_on:
      - pg

  pg:
    container_name: pg
    image: postgres:16
    env_file:
      - .env.django
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: always

  nginx:
    image: nginx:1.28
    container_name: todo-api-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./nginx/todo.conf:/etc/nginx/conf.d/default.conf
      - ./backend/ssl:/etc/nginx/ssl
      - ./backend/static:/backend/static
      - ./tmp/:/tmp
    depends_on:
      - backend

volumes:
  pg_data:
  grafana_data:

networks:
  default:
    external: true
    name: todo-network
